name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Test (pytest)
        run: uv run pytest -q

  game:
    name: Game (Godot web export)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the same image used in dev: this runs the headless Godot HTML5
      # export and fails if the build is missing (see game/Dockerfile).
      - name: Build Godot web export image
        run: docker build --build-arg GODOT_VERSION=4.4.1 -t townling-game ./game

      - name: Smoke-test the served build
        run: |
          docker run -d --name townling-game -p 8080:80 townling-game
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8080/; then break; fi
            sleep 1
          done
          echo "index content-type:"
          curl -sI http://localhost:8080/ | grep -i content-type
          curl -sf -o /dev/null -w "config.json: HTTP %{http_code}\n" http://localhost:8080/config.json
          curl -sf -o /dev/null -w "index.wasm: HTTP %{http_code}\n" http://localhost:8080/index.wasm
          docker rm -f townling-game
