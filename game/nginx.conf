server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Godot 4 web exports run happily single-threaded (thread_support=false in
    # export_presets.cfg). These cross-origin-isolation headers are harmless
    # now and already correct if threading is enabled later.
    location / {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        try_files $uri $uri/ =404;
    }

    # nginx's bundled mime.types already maps .wasm -> application/wasm and
    # .html -> text/html. Do NOT add a local `types { }` block here: it would
    # replace the whole map (not extend it) and break Content-Type detection.

    gzip on;
    gzip_types application/javascript application/wasm text/html application/json image/svg+xml;
}
